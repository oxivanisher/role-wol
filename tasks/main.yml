---
# tasks file for wol

- name: Install ethtool
  ansible.builtin.package:
    name: ethtool
    state: present
  become: true

- name: Deploy WOL systemd service
  ansible.builtin.template:
    src: wol.service.j2
    dest: "/etc/systemd/system/wol@.service"
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Force systemd to reload
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Check WOL support for interfaces
  ansible.builtin.shell: "ethtool {{ item }} | grep -q 'Wake-on: g'"
  ignore_errors: "{{ ansible_check_mode }}"
  changed_when: false
  failed_when: false
  loop: "{{ ansible_facts.interfaces | select('search', '^(eth|en)') | list }}"
  loop_control:
    label: "{{ item }}"
  register: wol_support
  become: true

- name: Enable and start WOL services for supported interfaces
  ansible.builtin.systemd_service:
    name: "wol@{{ item.item }}"
    state: started
    enabled: true
  loop: "{{ wol_support.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.rc == 0
  become: true
